site:
  title: Bioregioning Earth
  description: A living map of bioregional actors and initiatives
  lang: en

map:
  center: [0, 20]
  zoom: 1.5
  style:
    version: 8
    sources:
      osm:
        type: raster
        tiles:
          - https://tile.openstreetmap.org/{z}/{x}/{y}.png
        tileSize: 256
        attribution: '&copy; OpenStreetMap contributors'
    layers:
      - id: osm
        type: raster
        source: osm
